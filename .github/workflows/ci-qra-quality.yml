name: QRA Quality

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: qra-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qra-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[test]"

      - name: Run QRA quality report unit tests
        run: python3 -m pytest -q tests/test_qra_quality_report.py

      - name: Run QRA quality contract gate
        run: |
          if [[ ! -f data/raw/qra/downloads.csv || ! -f data/processed/official_quarterly_refunding_capture.csv ]]; then
            echo "Skipping QRA quality contract gate on clean checkout: required local data artifacts are absent."
            exit 0
          fi
          python3 scripts/14_qra_quality_report.py --fail-on-contract

      - name: Run backend validator unit tests
        run: python3 -m pytest -q tests/test_validate_backend.py

      - name: Run backend validator
        run: |
          if [[ ! -f data/processed/official_quarterly_refunding_capture.csv || ! -d output/publish ]]; then
            echo "Skipping backend validator on clean checkout: required local build artifacts are absent."
            exit 0
          fi
          python3 scripts/21_validate_backend.py
